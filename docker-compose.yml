services:
  postgres:
    image: postgres:16-alpine
    container_name: red-auto-postgres
    restart: unless-stopped
    ports:
      - '5433:5432'
    environment:
      POSTGRES_USER: redauto
      POSTGRES_PASSWORD: redauto
      POSTGRES_DB: redauto
    volumes:
      - red_auto_pg_data:/var/lib/postgresql/data

volumes:
  red_auto_pg_data:
