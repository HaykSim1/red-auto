# Railway config-as-code (service root = this `api/` folder).
# https://docs.railway.com/reference/config-as-code
#
# Dashboard: Postgres + variables from .env.railway.example.
# If this file is at the repo root (API-only repo), Root Directory stays empty.
# If the repo is a monorepo, set Railway Root Directory to the folder containing this file.

[build]
buildCommand = "npm ci && npm run build"
watchPatterns = ["src/**", "package.json", "package-lock.json", "tsconfig*.json", "nest-cli.json"]

[deploy]
startCommand = "npm run start:prod"
preDeployCommand = ["node ./node_modules/typeorm/cli.js migration:run -d dist/database/data-source.js"]
healthcheckPath = "/v1/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
